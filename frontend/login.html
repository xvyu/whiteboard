<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>协作白板 V2 - 登录</title>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="icon">🎨</div>
    <h1>协作白板 V2</h1>
    <p>多人实时绘图 · 聊天 · 持久化</p>
  </div>
  <div class="form-area">
    <div class="tabs">
      <div class="tab active" onclick="switchTab('login')">登录</div>
      <div class="tab" onclick="switchTab('register')">注册</div>
    </div>

    <div id="loginForm">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="loginUser" placeholder="输入用户名" autocomplete="username">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPass" placeholder="输入密码" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()">登 录</button>
    </div>

    <div id="registerForm" style="display:none">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="regUser" placeholder="至少2个字符" autocomplete="username">
      </div>
      <div class="form-group">
        <label>昵称</label>
        <input type="text" id="regNick" placeholder="显示名称（可选）">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="regPass" placeholder="至少4位" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="doRegister()">注 册</button>
    </div>

    <div class="error" id="errorMsg"></div>
    <div class="success" id="successMsg"></div>

    <div class="divider">或</div>

    <div class="room-input-area">
      <div class="form-group">
        <label>房间号（可选，相同房间号一起协作）</label>
        <input type="text" id="roomKey" placeholder="留空自动生成" value="">
      </div>
      <div class="form-group">
        <label>房间密码（可选）</label>
        <input type="text" id="roomPwd" placeholder="留空为无密码房间" maxlength="50">
        <div class="info-text">游客模式无需登录，直接进入白板</div>
      </div>
      <button class="btn btn-guest" onclick="enterAsGuest()">以游客身份进入</button>
    </div>
  </div>
</div>

<script type="module" src="/src/login/main.js"></script>
</body>
</html>
